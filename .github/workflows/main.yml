name: Build Android APK (Java 17)
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ഇവിടെ നമ്മൾ പൂർണ്ണമായും Java 17 ഉപയോഗിക്കുന്നു
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          # ആൻഡ്രോയിഡിന്റെ പുതിയ പതിപ്പ് (12) ഉപയോഗിക്കുന്നു, ഇത് Java 17-ൽ പ്രവർത്തിക്കും
          cordova platform add android@12.0.0 || true
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "platforms/android/app/build/outputs/apk/debug/*.apk"
